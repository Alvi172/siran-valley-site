<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Siran Valley Order Form</title>
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://www.siran.pk/order/">
  <meta http-equiv="refresh" content="0; url=https://docs.google.com/forms/d/e/1FAIpQLSfyjVqYFgrBSerqLPgga8OnsAfN9dl-ZMRyycB4XwV-dk-fLA/viewform?usp=publish-editor">
  <style>
    :root{--brand:#47653e;--bg:#f8f5ef;--text:#1f2a1f;--line:#e7ded0}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);padding:24px}
    .card{max-width:620px;background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 14px 34px rgba(26,31,24,.08);text-align:center}
    img{height:74px;width:auto;margin:0 auto 12px}
    h1{margin:0 0 10px;font-size:1.7rem;color:var(--brand)}
    p{line-height:1.6}
    a{display:inline-flex;margin-top:12px;background:var(--brand);color:#fff;text-decoration:none;border-radius:999px;padding:12px 18px;font-weight:800}
  </style>
  <script>
    window.location.replace("https://docs.google.com/forms/d/e/1FAIpQLSfyjVqYFgrBSerqLPgga8OnsAfN9dl-ZMRyycB4XwV-dk-fLA/viewform?usp=publish-editor");
  </script>
</head>
<body>
  <main class="card">
    <img src="/logo.webp" alt="Siran Valley Organic Farm">
    <h1>Siran Valley Order Form</h1>
    <p>You are being redirected to the official Siran Valley order form.</p>
    <p>آپ کو سیرن ویلی کے آفیشل آرڈر فارم پر بھیجا جا رہا ہے۔</p>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfyjVqYFgrBSerqLPgga8OnsAfN9dl-ZMRyycB4XwV-dk-fLA/viewform?usp=publish-editor">Open Order Form</a>
  </main>
</body>
</html>
